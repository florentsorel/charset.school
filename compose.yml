services:
  database:
    image: postgres:18-alpine
    container_name: charset-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: charset
      POSTGRES_USER: charset
      POSTGRES_PASSWORD: charset
    ports:
      - "5432:5432"
    volumes:
      - charset-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charset -d charset"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  charset-postgres-data:
