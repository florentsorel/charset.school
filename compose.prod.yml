services:
  database:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    image: ghcr.io/florentsorel/charset-back:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB:?POSTGRES_DB must be set}
      APP_DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER must be set}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      APP_REMEMBER_ME_KEY: ${APP_REMEMBER_ME_KEY:?APP_REMEMBER_ME_KEY must be set}
    ports:
      - "8080:8080"
    restart: unless-stopped

  front:
    image: ghcr.io/florentsorel/charset-front:${TAG:-latest}
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - back
    environment:
      NUXT_API_BASE_SERVER: http://back:8080/api
      NUXT_OG_IMAGE_SECRET: ${NUXT_OG_IMAGE_SECRET:?NUXT_OG_IMAGE_SECRET must be set}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
