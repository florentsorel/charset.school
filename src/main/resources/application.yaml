spring:
  application:
    name: charset.school

logging:
  level:
    # Domain stays silent (it's pure - no logging by design); infra logs at
    # INFO. Override per-package via env, e.g. LOGGING_LEVEL_SCHOOL_CHARSET_APP_INFRASTRUCTURE=DEBUG.
    school.charset.app: INFO
    school.charset.app.domain: WARN
  pattern:
    # Inject the per-request trace id (set by TraceIdFilter -> MDC) into the
    # level field of Spring Boot's default console pattern, keeping the rest
    # of the default layout. `-no-trace` shows when there's no request context
    # (startup, scheduled tasks).
    level: "%5p [%X{traceId:-no-trace}]"

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${APP_DB_URL:jdbc:postgresql://localhost:5432/charset}
    username: ${APP_DB_USERNAME:charset}
    password: ${APP_DB_PASSWORD:charset}
