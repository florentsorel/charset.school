name: Back

on:
  merge_group:
    types:
      - checks_requested
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "Dockerfile"
      - ".dockerignore"
      - "back.yml"
  push:
    branches:
      - main
      - prod
    tags:
      - 'v*'
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "Dockerfile"
      - ".dockerignore"
      - "back.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # `check` runs unit tests, ktlint and intTest (Testcontainers — works
      # because ubuntu-latest has a Docker daemon). The Docker image build
      # below is independent and runs its own gradle bootJar — we don't
      # share artifacts so both layers stay self-contained.
      - name: Build & test
        run: ./gradlew check --no-daemon --info

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "build/test-results/**/*.xml"

  image:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main'
          || github.ref == 'refs/heads/prod'
          || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags produced:
      #   - main push    → `:latest` + `:sha-<short>`
      #   - prod push    → `:sha-<short>`
      #   - tag v1.2.3   → `:1.2.3` + `:1.2` + `:1` + `:sha-<short>`
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/florentsorel/charset-back
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=back
          cache-to: type=gha,scope=back,mode=max
